<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exo Game Arena - Free Online Games</title>
    <meta name="description" content="Play 100+ free online games instantly on Exo Game Arena">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Fredoka', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; }
        
        /* Fixed Buttons */
        .fixed-btn { position: fixed; bottom: 30px; width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #f97316, #dc2626); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.3s; z-index: 1000; opacity: 0; visibility: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .fixed-btn.show { opacity: 1; visibility: visible; }
        .fixed-btn:hover { transform: scale(1.1); }
        .reset-btn { right: 100px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        .top-btn { right: 30px; }
        
        /* Category Buttons */
        .category-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 50px; font-size: 14px; font-weight: 600; transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .category-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .category-btn.active { background: linear-gradient(135deg, #ec4899, #8b5cf6); border-color: transparent; }
        
        /* Game Cards */
        .game-card { transition: all 0.3s; cursor: pointer; animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
        .game-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5); background: rgba(255,255,255,0.15) !important; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Sticky Header */
        .sticky-header { position: sticky; top: 0; background: rgba(15,23,42,0.95); backdrop-filter: blur(15px); z-index: 99; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* Loader */
        .loader { border-top-color: #f97316; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Search Clear */
        .search-clear { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1b4b; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 4px; }
        
        @media (max-width: 640px) {
            .reset-btn { right: 80px; width: 45px; height: 45px; font-size: 20px; }
            .top-btn { right: 20px; width: 45px; height: 45px; font-size: 20px; }
            .category-btn { padding: 6px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- Fixed Buttons -->
    <button id="resetBtn" class="fixed-btn reset-btn" title="Reset">⟳</button>
    <button id="topBtn" class="fixed-btn top-btn" title="Go to top">↑</button>

    <!-- Sticky Header -->
    <div class="sticky-header">
        <div class="max-w-7xl mx-auto px-4 py-4 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold"><span class="text-white">play on</span> <span class="text-pink-500">Exo game!</span></h1>
            <p class="text-indigo-300 text-sm md:text-base">🎮 100+ free games | Play instantly 🎮</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Search -->
        <div class="relative max-w-lg mx-auto mb-8">
            <input type="text" id="searchInput" placeholder="🔎 Search game..." class="w-full px-6 py-4 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 pr-12">
            <div id="searchClear" class="search-clear hidden">✕</div>
        </div>
        
        <!-- Categories -->
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <button class="category-btn active" data-cat="all">🎲 All</button>
            <button class="category-btn" data-cat="action">🏃 Action</button>
            <button class="category-btn" data-cat="puzzle">🧩 Puzzle</button>
            <button class="category-btn" data-cat="racing">🏎️ Racing</button>
            <button class="category-btn" data-cat="sports">⚽ Sports</button>
            <button class="category-btn" data-cat="arcade">👾 Arcade</button>
        </div>

        <!-- Stats -->
        <p id="gameCount" class="text-gray-300 mb-6">🎮 Loading games...</p>

        <!-- Loading & Error -->
        <div id="loading" class="flex flex-col items-center py-20"><div class="loader rounded-full border-8 border-gray-700 border-t-orange-500 h-16 w-16 mb-4"></div><p class="text-gray-300">Loading games... 🚀</p></div>
        <div id="error" class="hidden text-center py-20 bg-red-900/30 rounded-2xl"><p class="text-red-400">⚠️ Failed to load games</p><button onclick="location.reload()" class="mt-4 bg-red-500 px-6 py-2 rounded-full">🔄 Retry</button></div>

        <!-- Game Grid -->
        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        
        <footer class="mt-16 pt-8 border-t border-white/10 text-center text-gray-400 text-sm">© 2024 Exo Game Arena | Play responsibly 🎮</footer>
    </div>

    <script>
        // আপনার CSV লিংক (ইতিমধ্যে বসানো আছে)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/1KOYxfabYXTEi0QaGxO-zzZUhAQL15zZlhflrqwRLeEE/export?format=csv';
        
        let allGames = [];
        let currentCat = 'all';
        let currentSearch = '';

        function getGameCategory(game) {
            const name = (game.Name || game.name || '').toLowerCase();
            if (name.includes('race') || name.includes('car') || name.includes('drive')) return 'racing';
            if (name.includes('puzzle') || name.includes('match') || name.includes('brain')) return 'puzzle';
            if (name.includes('sport') || name.includes('football') || name.includes('basket')) return 'sports';
            if (name.includes('arcade') || name.includes('classic')) return 'arcade';
            return 'action';
        }

        function filterGames() {
            let filtered = [...allGames];
            if (currentSearch) filtered = filtered.filter(g => (g.Name || g.name || '').toLowerCase().includes(currentSearch));
            if (currentCat !== 'all') filtered = filtered.filter(g => getGameCategory(g) === currentCat);
            displayGames(filtered);
        }

        async function fetchGames() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');
            try {
                const res = await fetch(csvUrl);
                if (!res.ok) throw new Error();
                const csv = await res.text();
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        allGames = results.data;
                        filterGames();
                        document.getElementById('loading').classList.add('hidden');
                    },
                    error: () => { document.getElementById('loading').classList.add('hidden'); document.getElementById('error').classList.remove('hidden'); }
                });
            } catch { document.getElementById('loading').classList.add('hidden'); document.getElementById('error').classList.remove('hidden'); }
        }

        function displayGames(games) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            if (!games.length) { grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400">😔 No games found</div>'; document.getElementById('gameCount').innerHTML = '🎮 0 games'; return; }
            
            games.forEach(game => {
                const name = game.Name || game.name || 'Unknown';
                let icon = game.Icon || game.icon || '';
                const link = game.Link || game.link || '#';
                if (!icon) icon = 'https://placehold.co/400x400/1e1b4b/ffffff?text=🎮';
                
                const card = document.createElement('div');
                card.className = 'game-card bg-white/10 backdrop-blur-sm rounded-2xl p-4 border border-white/20';
                card.innerHTML = `<div class="aspect-square rounded-xl overflow-hidden bg-gray-800 mb-3"><img src="${icon}" alt="${name}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://placehold.co/400x400/2d2d5e/ffffff?text=🎮'"></div><h3 class="text-white font-bold truncate">${name}</h3><button class="play-btn mt-3 w-full bg-gradient-to-r from-blue-500 to-purple-600 py-2 rounded-full text-sm">🎮 Play</button>`;
                card.querySelector('.play-btn').onclick = (e) => { e.stopPropagation(); if (link !== '#') window.open(link, '_blank'); else alert('Link coming soon'); };
                grid.appendChild(card);
            });
            document.getElementById('gameCount').innerHTML = `🎮 ${games.length} games`;
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value.toLowerCase().trim(); document.getElementById('searchClear').classList.toggle('hidden', !currentSearch); filterGames(); });
        document.getElementById('searchClear').addEventListener('click', () => { document.getElementById('searchInput').value = ''; currentSearch = ''; document.getElementById('searchClear').classList.add('hidden'); filterGames(); });
        
        document.querySelectorAll('.category-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentCat = btn.dataset.cat; filterGames(); }); });
        
        window.addEventListener('scroll', () => { document.getElementById('topBtn').classList.toggle('show', window.scrollY > 300); });
        document.getElementById('topBtn').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        document.getElementById('resetBtn').addEventListener('click', () => { document.getElementById('searchInput').value = ''; currentSearch = ''; document.getElementById('searchClear').classList.add('hidden'); document.querySelector('[data-cat="all"]').click(); });
        
        fetchGames();
    </script>
</body>
</html>
